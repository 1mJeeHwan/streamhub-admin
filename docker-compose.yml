services:
  mysql:
    image: mysql:8.0
    container_name: streamhub-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: streamhub
      MYSQL_USER: streamhub
      MYSQL_PASSWORD: streamhub
      TZ: Asia/Seoul
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      # Creates per-service schemas (e.g. streamhub_audit) on a fresh volume — DB-per-service.
      - ./deploy/mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: streamhub-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: streamhub-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: streamhub
      MINIO_ROOT_PASSWORD: streamhub123
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: create the media bucket and expose encrypted HLS for browser playback.
  #
  # Anonymous read is scoped to the `hls/` prefix ONLY (not the whole bucket).
  # This is safe: the user-web player (localhost:3001) fetches the .ts segments
  # directly, cross-origin, from MinIO — but every segment is AES-128 encrypted,
  # so a public GET on hls/* exposes ciphertext, never the audio. The AES key is
  # delivered separately (gated) and never lives under the public prefix.
  #
  # CORS: MinIO returns a permissive Access-Control-Allow-Origin for anonymous
  # object GETs, so the cross-origin .ts fetch from localhost:3001 works without
  # extra config. (If a future MinIO build tightens this, set explicit per-bucket
  # CORS via `mc admin config set` / the bucket CORS API.)
  minio-init:
    image: minio/mc:latest
    container_name: streamhub-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 streamhub streamhub123 &&
      mc mb --ignore-existing local/streamhub-media &&
      mc anonymous set download local/streamhub-media/hls &&
      echo 'bucket ready';
      "

  # LocalStack — SQS emulation. The same AWS SDK / spring-cloud-aws code that
  # targets this locally works unchanged against real SQS in production.
  localstack:
    image: localstack/localstack:3
    container_name: streamhub-localstack
    environment:
      SERVICES: sqs
      DEBUG: "0"
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD-SHELL", "awslocal sqs list-queues || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15

  # Kafka (KRaft, single broker) — the alternate async transport for the action-log pipeline.
  # Used only when the API runs with EVENTLOG_TRANSPORT=kafka (default is SQS). Dual listeners:
  # host clients (./mvnw on the host) reach localhost:9092; in-network containers reach kafka:29092.
  kafka:
    image: apache/kafka:3.9.0
    container_name: streamhub-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:29093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  # Observability — Prometheus scrapes the API's /actuator/prometheus; Grafana visualizes it.
  # The API runs on the host (./mvnw), so Prometheus targets host.docker.internal:8080
  # (see deploy/observability/prometheus.yml). Grafana UI on http://localhost:3030 (anon enabled).
  prometheus:
    image: prom/prometheus:latest
    container_name: streamhub-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    container_name: streamhub-grafana
    ports:
      - "3030:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./deploy/observability/grafana-datasource.yml:/etc/grafana/provisioning/datasources/ds.yml:ro
    depends_on:
      - prometheus

volumes:
  mysql-data:
  minio-data:
