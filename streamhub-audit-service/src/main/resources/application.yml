spring:
  application:
    name: streamhub-audit-service
  datasource:
    # DB-per-service: this service OWNS the audit store in its own schema (streamhub_audit), separate
    # from the monolith's `streamhub` DB. The monolith no longer reads ACTION_LOG directly — it calls
    # this service's /v1/action-logs read API (ACTIONLOG_SOURCE=remote). See docs/msa-split.md.
    url: jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:streamhub_audit}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USER:streamhub}
    password: ${DB_PASSWORD:streamhub}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update          # this service creates/owns ACTION_LOG in its own schema
    open-in-view: false
    properties:
      hibernate:
        naming:
          physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_GROUP_ID:streamhub-action-log}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        # Ignore the producer's __TypeId__ header (it names the monolith's class, absent here) and
        # always deserialize into this service's own record. This is the key cross-service contract.
        spring.json.use.type.headers: false
        spring.json.value.default.type: org.streamhub.audit.ActionLogMessage
        spring.json.trusted.packages: org.streamhub.audit

server:
  port: 8090

app:
  kafka:
    action-log-topic: ${KAFKA_ACTION_LOG_TOPIC:streamhub-action-log}

management:
  endpoints:
    web:
      exposure:
        include: health
