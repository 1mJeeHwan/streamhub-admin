spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME:streamhub}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useSSL=true
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      # Default: validate only — Hibernate never mutates a prod schema. Real operations would
      # manage the schema with Flyway/Liquibase; for the initial bootstrap of this demo you may
      # set JPA_DDL_AUTO=update once, then return to validate.
      ddl-auto: ${JPA_DDL_AUTO:validate}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

# Real AWS S3 — no endpoint override; credentials come from the EC2 IAM instance role.
storage:
  endpoint: ${S3_ENDPOINT:}
  region: ${AWS_REGION:ap-northeast-2}
  bucket: ${S3_BUCKET}

# Real SQS — no endpoint override; credentials from the EC2 IAM instance role.
spring.cloud.aws:
  region.static: ${AWS_REGION:ap-northeast-2}

jwt:
  secret: ${JWT_SECRET}
  access-exp-seconds: 3600
  refresh-exp-seconds: 28800

server:
  port: 8080
