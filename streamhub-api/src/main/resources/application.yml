spring:
  application:
    name: streamhub-api
  profiles:
    active: local
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB
  jpa:
    hibernate:
      ddl-auto: update          # dev: Hibernate manages schema from entities
      naming:
        # Preserve the exact @Table/@Column names (e.g. MEMBER, not member) so the
        # MyBatis XML and JPA agree on case — required on case-sensitive MySQL (Linux).
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  # Kafka — only used when app.eventlog.transport=kafka. JSON (de)serialization of ActionLogMessage.
  # In sqs mode these are inert (no @KafkaListener container starts); KafkaAdmin may log one
  # harmless "broker not available" warning at boot if no broker is running.
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_GROUP_ID:streamhub-action-log}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: org.streamhub.api.v1.actionlog.dto
        spring.json.value.default.type: org.streamhub.api.v1.actionlog.dto.ActionLogMessage
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

mybatis:
  mapper-locations: classpath:mappers/*.xml
  configuration:
    map-underscore-to-camel-case: true   # member_id -> memberId

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
    tags-sorter: alpha
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

server:
  port: 8080

jwt:
  # Dev default; override with JWT_SECRET in any real environment. Must be long for HMAC512.
  secret: ${JWT_SECRET:streamhub-admin-dev-secret-key-please-change-in-production-0123456789}
  access-exp-seconds: 3600       # 1h
  refresh-exp-seconds: 28800     # 8h

# 외부 연동 seam(실키 활성화) + 배치(스케줄러) 전체 요약은 패키지 주석 참고:
#   streamhub-api/src/main/java/org/streamhub/api/package-info.java
# 아래 각 블록은 해당 seam의 env 자리. 기본값은 mock/seed/공개 데모키라 키 없이도 동작하고,
# 실키는 환경변수로만 주입하면 코드 변경 없이 실연동으로 전환된다.
app:
  # Async action-log transport seam. sqs(기본) = AWS SQS(@SqsListener, LocalStack 로컬);
  # kafka = Apache Kafka(@KafkaListener). 빈 교체 + env 플래그만으로 전환, 호출부 무변경.
  eventlog:
    transport: ${EVENTLOG_TRANSPORT:sqs}   # sqs | kafka
  sqs:
    action-log-queue: ${SQS_ACTION_LOG_QUEUE:streamhub-action-log}
  kafka:
    action-log-topic: ${KAFKA_ACTION_LOG_TOPIC:streamhub-action-log}
  # Worship (C2) external-integration seams. Defaults are demo/test no-ops; switch to a real
  # provider by overriding these (e.g. postcode.provider=kakao, sms.provider=aligo) + adding
  # the matching @ConditionalOnProperty bean. No real external call is made in mock/noop mode.
  worship:
    postcode:
      provider: ${WORSHIP_POSTCODE_PROVIDER:mock}
    sms:
      provider: ${WORSHIP_SMS_PROVIDER:noop}
  # Church-finder (C1) geocoding seam. seed = deterministic demo coordinates, no external call;
  # kakao = real Kakao Local key injection point (kakao-rest-key empty = not wired).
  # discovery = nearby real-church POI source. noop = DB-only (default); kakao = merge real
  # surrounding churches from Kakao Local (real-time, not persisted; reuses kakao-rest-key).
  church:
    geocode:
      provider: ${CHURCH_GEOCODE_PROVIDER:seed}
      kakao-rest-key: ${CHURCH_GEOCODE_KAKAO_REST_KEY:}
    discovery:
      provider: ${CHURCH_DISCOVERY_PROVIDER:noop}
  # Payment (C4) PG seam. mock = fake approve, no real charge. toss = REAL sandbox integration:
  # the album checkout's Toss option calls the live Toss confirm API with the keys below. The
  # Keys are NOT committed (public repo). Toss publishes public test keys (test_ck_/test_sk_) in its
  # official sample repo (github.com/tosspayments/tosspayments-sample) — set them on PAYMENT_TOSS_*
  # to run the Toss sandbox demo; a real merchant key goes live with no code change. paypal/kakao
  # remain @ConditionalOnProperty-gated stubs. test-mode only affects the mock approval memo.
  payment:
    provider: ${PAYMENT_PROVIDER:mock}
    test-mode: ${PAYMENT_TEST_MODE:true}
    # Browser origin redirect PGs (kakao/paypal) send the user back to (/checkout/success|fail).
    return-base-url: ${PAYMENT_RETURN_BASE_URL:http://localhost:3001}
    toss:
      client-key: ${PAYMENT_TOSS_CLIENT_KEY:}
      secret-key: ${PAYMENT_TOSS_SECRET_KEY:}
    # kakao/paypal: real adapter code, but @ConditionalOnProperty-gated on the key below — empty by
    # default so the bean is absent and the router falls back to mock. Inject your own sandbox key
    # to activate (no public test key exists for these, unlike Toss).
    paypal:
      client-id: ${PAYMENT_PAYPAL_CLIENT_ID:}
      secret: ${PAYMENT_PAYPAL_SECRET:}
      currency: ${PAYMENT_PAYPAL_CURRENCY:USD}
    kakao:
      secret-key: ${PAYMENT_KAKAO_SECRET_KEY:}
      cid: ${PAYMENT_KAKAO_CID:TC0ONETIME}
  # Delivery tracking (C8) seam. sweettracker = REAL aggregator API (스마트택배). The api-key is NOT
  # committed (public repo) — get a free key (or the public docs demo key) from SweetTracker
  # (info.sweettracker.co.kr/apidoc) and set DELIVERY_SWEETTRACKER_API_KEY. mock = offline timeline.
  delivery:
    provider: ${DELIVERY_PROVIDER:sweettracker}
    # Scheduler that polls SHIPPING orders and auto-advances 배달완료 → DONE (default every 30m).
    sync-cron: ${DELIVERY_SYNC_CRON:0 */30 * * * *}
    sweettracker:
      api-key: ${DELIVERY_SWEETTRACKER_API_KEY:}
  # SMS/LMS (C6) sender seam. mock = log-only, no external send; aligo/solapi = real key
  # injection points (@ConditionalOnProperty-gated). Seeded messages are all testMode=Y.
  sms:
    sender: ${SMS_SENDER:mock}
    aligo:
      api-key: ${SMS_ALIGO_API_KEY:}
      user-id: ${SMS_ALIGO_USER_ID:}
    solapi:
      api-key: ${SMS_SOLAPI_API_KEY:}
      api-secret: ${SMS_SOLAPI_API_SECRET:}
  # Chatbot (C6) provider seam. rule = keyword FAQ + DB조회 + 기능 카탈로그 안내, 외부호출 없음(기본);
  # llm = Google Gemini function-calling 실연동. Gemini 무료 티어는 비용 없이 키만 필요
  # (CHAT_LLM_API_KEY). 키가 비었거나 호출 실패 시 rule로 자동 폴백하므로 위젯은 항상 동작한다.
  chat:
    provider: ${CHAT_PROVIDER:rule}        # rule(기본) | llm(Gemini)
    llm:
      api-key: ${CHAT_LLM_API_KEY:}        # Gemini API key(무료 티어). 빈 값이면 rule 폴백
      model: ${CHAT_LLM_MODEL:gemini-2.5-flash}
      base-url: ${CHAT_LLM_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
  # Music preview (C3) source seam. seed = SoundHelix demo samples, no external call;
  # external = real music-provider key injection point (@ConditionalOnProperty-gated stub).
  music:
    provider: ${MUSIC_PROVIDER:seed}
    external:
      api-key: ${MUSIC_EXTERNAL_API_KEY:}
      base-url: ${MUSIC_EXTERNAL_BASE_URL:}
  # Encrypted full-track streaming (HLS + AES-128). ffmpeg packages the audio into AES-128
  # encrypted .ts segments; the encrypted segments are served from the CDN, only the key is gated.
  # segment-base-url = the CDN/storage base the player loads segments from (env-specific):
  #   prod  → the CloudFront distribution (e.g. https://xxxx.cloudfront.net), /hls/* → S3
  #   local → MinIO (http://localhost:9000/streamhub-media)
  hls:
    ffmpeg-path: ${HLS_FFMPEG_PATH:ffmpeg}
    segment-base-url: ${HLS_SEGMENT_BASE_URL:}
